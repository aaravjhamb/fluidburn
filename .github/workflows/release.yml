name: Release

# Build a signed + notarized macOS DMG and attach it to a GitHub Release.
# Triggered by pushing a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write # needed to create the GitHub Release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (with Intel + Apple Silicon targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign, notarize & publish DMG
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing (Developer ID Application certificate) ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # --- Notarization (Apple ID + app-specific password) ---
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Universal binary runs natively on both Apple Silicon and Intel Macs.
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "FluidBurn ${{ github.ref_name }}"
          releaseBody: "Download the `.dmg` below, open it, and drag FluidBurn to Applications."
          releaseDraft: false
          prerelease: false
