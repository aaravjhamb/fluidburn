name: Release

# Build a signed + notarized macOS DMG and attach it to a GitHub Release.
# Triggered by pushing a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write # needed to create the GitHub Release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (with Intel + Apple Silicon targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & publish DMG (unsigned)
        uses: tauri-apps/tauri-action@v0
        # NOTE: This builds an UNSIGNED, un-notarized DMG (no Apple Developer
        # Program membership). It works, but macOS Gatekeeper will warn users.
        # See releaseBody below for the one-time "open anyway" instructions.
        # To sign later: enroll in the Apple Developer Program, add the
        # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
        # / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID secrets, and pass them
        # here under `env:`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Universal binary runs natively on both Apple Silicon and Intel Macs.
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "FluidBurn ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          releaseBody: |
            ### Install (macOS)
            1. Download **FluidBurn_*_universal.dmg** below.
            2. Open it and drag **FluidBurn** to **Applications**.
            3. This build is not signed by Apple, so the first launch needs one extra step:
               open **Terminal** and run:
               ```
               xattr -cr /Applications/FluidBurn.app
               ```
               then open FluidBurn normally. (You only do this once.)

            > Alternatively: right-click the app → **Open**, and if macOS still blocks it,
            > go to **System Settings → Privacy & Security** and click **Open Anyway**.
